name: Deploy Portfolio
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
      NEXT_PUBLIC_SANITY_DATASET: ${{ secrets.NEXT_PUBLIC_SANITY_DATASET }}
      NEXT_TELEMETRY_DISABLED: ${{ secrets.NEXT_TELEMETRY_DISABLED }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: 🌴 Checkout code
        uses: actions/checkout@v4

      - name: 🧰 Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🧩 Install missing native binaries
        run: |
          npm install @parcel/css-linux-x64-gnu
          npm install @ast-grep/napi-linux-x64-gnu

      - name: 🔧 Rebuild lightningcss native binary
        run: npm rebuild lightningcss

      - name: 🚨 Clear existing kv cache
        run: npm run clear-kv-cache
        
      - name: 🗣️ Generate Cloudflare types
        run: npm run cf-typegen

      - name: 🛡️ Write .dev.vars from GitHub secrets
        run: |
          cat <<EOF > .dev.vars

          NEXT_TELEMETRY_DISABLED=${{ secrets.NEXT_TELEMETRY_DISABLED }}
          NEXT_PUBLIC_SANITY_PROJECT_ID=${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
          NEXT_PUBLIC_SANITY_DATASET=${{ secrets.NEXT_PUBLIC_SANITY_DATASET }}
          EOF
          
      - name: 🛠️ Build the Next.js app
        run: npm run build-deploy

      - name: 🚀 Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        